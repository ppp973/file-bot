services:
  - type: worker
    name: telegram-file-store-bot
    runtime: python
    region: virginia  # Matches your region
    plan: free  # Using free tier
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        value: 8781174136:AAGaqdtP5i-AHAUmMy5ZXIjIj-QxF9IU-aQ
      - key: API_ID
        value: 21503125
      - key: API_HASH
        value: bab9855c442e9e4e87f413cb5b9dc3f9
      - key: MONGO_URI
        sync: false  # You'll need to add this manually
      - key: ADMINS
        value: 123456789  # Replace with your admin ID
      - key: STORAGE_CHANNEL
        value: -1001234567890  # Replace with your channel ID
